providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.10"

# Using a custom phase name (system_deps) instead of "setup" so we don't accidentally overwrite 
# the Python provider's default setup phase commands.
[phases.system_deps]
cmds = [
    "apt-get update",
    "apt-get install -y libgl1 libglib2.0-0"
]

[start]
cmd = "gunicorn --workers 2 --bind 0.0.0.0:5000 --timeout 120 scan_id:app"
