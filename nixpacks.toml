providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.10"

[phases.setup]
# These system libraries are required by OpenCV (cv2) and PaddleOCR on Linux environments.
aptPkgs = [
    "libgl1-mesa-glx",
    "libglib2.0-0",
    "libgomp1"
]

[start]
# We use gunicorn instead of Flask's built-in development server for production.
cmd = "gunicorn --workers 2 --bind 0.0.0.0:5000 --timeout 120 scan_id:app"
