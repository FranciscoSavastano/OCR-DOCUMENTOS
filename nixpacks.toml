providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.10"

# Using a custom phase name (system_deps) instead of "setup" so we don't accidentally overwrite 
# the Python provider's default setup phase commands, which was causing the /bin/bash empty arg error.
[phases.system_deps]
aptPkgs = [
    "libgl1-mesa-glx",
    "libglib2.0-0",
    "libgomp1"
]

[start]
cmd = "gunicorn --workers 2 --bind 0.0.0.0:5000 --timeout 120 scan_id:app"
